name: Sync Daily

on:
  schedule:
    - cron: '0 4 * * *' # ogni giorno alle 04:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Sync Upstream
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: Realbestia1/Easyproxy
          upstream_sync_branch: main
          target_branch_push_args: --force

      - name: Show result
        run: echo "has_new_commits = ${{ steps.sync.outputs.has_new_commits }}"
